<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>TradeOS — Alerts (prototype)</title>
<style>
  :root {
    --page:#0B0E13; --panel:#0F141C; --card:#141A24; --card-2:#18202c;
    --line:#1B2330; --line-2:#232D3C;
    --text:#E8ECF4; --text-2:#93A0B4; --text-3:#5A6478;
    --accent:#6E56F7; --accent-2:#8B78FF; --cyan:#22D3EE;
    --up:#2EBD85; --down:#F6465D; --caution:#F5B23B;
    --up-bg:rgba(46,189,133,.12); --down-bg:rgba(246,70,93,.12);
    --cyan-bg:rgba(34,211,238,.10); --caution-bg:rgba(245,178,59,.10); --acc-bg:rgba(110,86,247,.12);
    --mono: ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,monospace;
    --sans: system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--page); color:var(--text); font:13px/1.45 var(--sans); -webkit-font-smoothing:antialiased; }
  .mono { font-family:var(--mono); } .tnum { font-variant-numeric:tabular-nums; }
  button,input,select { font-family:inherit; }
  .app { max-width:1180px; margin:0 auto; padding:0 20px 48px; }

  .top { display:flex; align-items:center; gap:14px; padding:16px 0; border-bottom:1px solid var(--line); }
  .brand { display:flex; align-items:center; gap:9px; font-weight:650; }
  .brand .dot { width:11px; height:11px; border-radius:3px; background:linear-gradient(135deg,var(--accent),var(--accent-2)); }
  .brand span { color:var(--text-3); font-weight:600; }
  .tool { padding-left:14px; border-left:1px solid var(--line); }
  .tool h1 { font-size:15px; margin:0; font-weight:640; }
  .tool p { margin:1px 0 0; font-size:11.5px; color:var(--text-3); }
  .spacer { flex:1; }
  .count { font-family:var(--mono); font-size:11.5px; color:var(--text-3); }

  .grid { display:grid; grid-template-columns:1fr 330px; gap:16px; margin-top:18px; align-items:start; }

  .panel { background:var(--panel); border:1px solid var(--line); border-radius:12px; }
  .panel .ph { padding:13px 16px; border-bottom:1px solid var(--line); font-size:12px; font-weight:620; letter-spacing:.2px; display:flex; align-items:center; gap:8px; }
  .ph .sub { color:var(--text-3); font-weight:400; font-size:11.5px; }

  /* create form */
  .builder { padding:16px; display:flex; flex-direction:column; gap:14px; }
  .seg { display:inline-flex; background:var(--card); border:1px solid var(--line); border-radius:9px; padding:2px; }
  .seg button { font-size:12px; color:var(--text-2); background:transparent; border:0; padding:8px 14px; border-radius:7px; cursor:pointer; display:inline-flex; align-items:center; gap:7px; }
  .seg button[aria-pressed="true"] { color:var(--text); background:var(--card-2); box-shadow:inset 0 0 0 1px var(--line-2); }
  .seg .d { width:8px; height:8px; border-radius:50%; }
  .seg .d.price{background:var(--cyan);} .seg .d.signal{background:var(--up);} .seg .d.risk{background:var(--caution);}
  .fields { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .fields .lead { color:var(--text-2); font-size:13px; }
  input, select {
    background:var(--card); border:1px solid var(--line); border-radius:9px; color:var(--text);
    padding:9px 11px; font-size:13px; font-family:var(--mono);
  }
  input:focus, select:focus { outline:none; border-color:var(--accent); }
  input.sym { width:88px; text-transform:uppercase; }
  input.num { width:104px; text-align:right; }
  select { font-family:var(--sans); }
  .channels { display:flex; align-items:center; gap:8px; }
  .chip { font-size:11.5px; color:var(--text-2); background:var(--card); border:1px solid var(--line); border-radius:999px; padding:6px 12px; cursor:pointer; display:inline-flex; gap:7px; align-items:center; }
  .chip[aria-pressed="true"] { color:var(--accent-2); background:var(--acc-bg); border-color:rgba(110,86,247,.4); }
  .chip .tick { width:6px; height:6px; border-radius:50%; background:currentColor; opacity:.5; }
  .create { align-self:flex-start; font-weight:620; font-size:13px; color:#fff; background:linear-gradient(180deg,var(--accent-2),var(--accent)); border:0; border-radius:10px; padding:11px 18px; cursor:pointer; }
  .create:active { transform:translateY(1px); }
  .hint { font-size:11.5px; color:var(--text-3); }

  /* active alerts list */
  .alist { display:flex; flex-direction:column; }
  .arow { display:flex; align-items:center; gap:12px; padding:13px 16px; border-bottom:1px solid var(--line); }
  .arow:last-child { border-bottom:0; }
  .tbadge { width:34px; height:34px; border-radius:9px; display:grid; place-items:center; flex-shrink:0; }
  .tbadge svg { width:16px; height:16px; }
  .tbadge.price { background:var(--cyan-bg); color:var(--cyan); }
  .tbadge.signal { background:var(--up-bg); color:var(--up); }
  .tbadge.risk { background:var(--caution-bg); color:var(--caution); }
  .acond { flex:1; min-width:0; }
  .acond .c { font-size:13px; font-weight:560; }
  .acond .m { font-size:11.5px; color:var(--text-3); font-family:var(--mono); margin-top:2px; }
  .acond .m .type { text-transform:uppercase; letter-spacing:.5px; }
  .status { font-family:var(--mono); font-size:10.5px; letter-spacing:.5px; padding:4px 9px; border-radius:6px; white-space:nowrap; }
  .status.armed { color:var(--cyan); background:var(--cyan-bg); }
  .status.triggered { color:var(--up); background:var(--up-bg); }
  .status.paused { color:var(--text-3); background:var(--card-2); }
  .iconbtn { background:transparent; border:0; color:var(--text-3); cursor:pointer; padding:6px; border-radius:7px; display:grid; place-items:center; }
  .iconbtn:hover { color:var(--text); background:var(--card); }
  .iconbtn svg { width:15px; height:15px; }

  /* feed */
  .feed { padding:6px 0; max-height:520px; overflow:auto; }
  .fitem { display:flex; gap:11px; padding:11px 16px; }
  .fdot { width:8px; height:8px; border-radius:50%; margin-top:5px; flex-shrink:0; }
  .fdot.price{background:var(--cyan);} .fdot.signal{background:var(--up);} .fdot.risk{background:var(--caution);}
  .fbody .ft { font-size:12.5px; }
  .fbody .ft b { font-weight:640; }
  .fbody .fm { font-size:11px; color:var(--text-3); font-family:var(--mono); margin-top:2px; }

  .toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--card-2); border:1px solid var(--line-2); border-radius:10px; padding:12px 16px; font-size:12.5px; opacity:0; pointer-events:none; transition:opacity .2s,transform .2s; z-index:60; display:flex; gap:10px; align-items:center; }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
  .toast .d { width:8px; height:8px; border-radius:50%; background:var(--up); }

  @media (max-width:840px){ .grid{ grid-template-columns:1fr; } }
</style>
</head>
<body>
<div class="app">
  <header class="top">
    <div class="brand"><span class="dot"></span>Trade<span>OS</span></div>
    <div class="tool"><h1>Alerts</h1><p>Price · signals · risk breaches</p></div>
    <div class="spacer"></div>
    <span class="count" id="count"></span>
  </header>

  <div class="grid">
    <div style="display:flex;flex-direction:column;gap:16px">
      <!-- builder -->
      <section class="panel">
        <div class="ph">New alert <span class="sub">— alert on more than price</span></div>
        <div class="builder">
          <div class="seg" id="type" role="group" aria-label="Alert type">
            <button data-type="price" aria-pressed="true"><span class="d price"></span> Price</button>
            <button data-type="signal"><span class="d signal"></span> Signal</button>
            <button data-type="risk"><span class="d risk"></span> Risk</button>
          </div>
          <div class="fields" id="fields"></div>
          <div class="channels">
            <span class="hint">Notify via</span>
            <button class="chip" data-ch="in-app" aria-pressed="true"><span class="tick"></span>In-app</button>
            <button class="chip" data-ch="email" aria-pressed="true"><span class="tick"></span>Email</button>
            <button class="chip" data-ch="push" aria-pressed="false"><span class="tick"></span>Push</button>
          </div>
          <button class="create" id="create">Create alert</button>
        </div>
      </section>

      <!-- active -->
      <section class="panel">
        <div class="ph">Active alerts <span class="sub" id="active-sub"></span></div>
        <div class="alist" id="alist"></div>
      </section>
    </div>

    <!-- feed -->
    <section class="panel">
      <div class="ph">Recent triggers</div>
      <div class="feed" id="feed"></div>
    </section>
  </div>
</div>

<div class="toast" id="toast"><span class="d"></span><span id="toast-txt"></span></div>

<script>
(function(){
  "use strict";
  var ICON={
    price:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="M7 14l3-3 4 4 5-7"/></svg>',
    signal:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2L4 14h7l-1 8 9-12h-7z"/></svg>',
    risk:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3l9 16H3z"/><path d="M12 9v5M12 17h.01"/></svg>'
  };
  var TYPE_LABEL={price:"Price",signal:"Signal",risk:"Risk"};

  var alerts=[
    {type:"signal", cond:"JPM · ENTER signal", meta:"Donchian breakout + above 200 SMA", status:"triggered"},
    {type:"risk",   cond:"NVDA · position risk > 1R", meta:"currently 1.30R", status:"triggered"},
    {type:"price",  cond:"AAPL · crosses above 460.00", meta:"last 456.93", status:"armed"},
    {type:"risk",   cond:"Portfolio · drawdown > 5%", meta:"currently 1.9%", status:"armed"},
    {type:"signal", cond:"Any · EXIT signal", meta:"10-day channel or ATR stop", status:"armed"},
    {type:"price",  cond:"SPY · crosses below 580.00", meta:"last 596.12", status:"paused"}
  ];
  var feed=[
    {type:"signal", t:"<b>JPM</b> ENTER signal fired", m:"9:32 AM · close 246.82 broke the 20-day high"},
    {type:"risk",   t:"<b>NVDA</b> position risk hit 1.30R", m:"9:31 AM · exceeds your 1.00R cap"},
    {type:"price",  t:"<b>AMD</b> crossed above 150.00", m:"Yesterday · 3:58 PM"},
    {type:"signal", t:"<b>TSLA</b> EXIT signal — ATR stop", m:"Yesterday · closed −0.9R"},
    {type:"risk",   t:"<b>Portfolio</b> drawdown crossed 2%", m:"2 days ago · peak-to-trough"}
  ];

  // ---- dynamic fields per type ----
  function fieldsFor(type){
    if(type==="price") return '<span class="lead">When</span><input class="sym" id="f-sym" value="AAPL" />'+
      '<select id="f-op"><option>crosses above</option><option>crosses below</option></select>'+
      '<input class="num tnum" id="f-val" value="460.00" />';
    if(type==="signal") return '<span class="lead">When</span><input class="sym" id="f-sym" value="Any" />'+
      '<span class="lead">fires</span><select id="f-op"><option>ENTER signal</option><option>EXIT signal</option><option>regime flips bullish</option><option>regime flips bearish</option></select>';
    return '<span class="lead">When</span><select id="f-op"><option>position risk &gt; 1R</option><option>portfolio drawdown &gt; threshold</option><option>daily loss &gt; threshold</option><option>a stop is hit</option></select>'+
      '<input class="num tnum" id="f-val" value="5" /><span class="lead" id="unit">% / $</span>';
  }
  var curType="price";
  function renderFields(){ document.getElementById("fields").innerHTML=fieldsFor(curType); }

  document.getElementById("type").addEventListener("click",function(e){
    var b=e.target.closest("button"); if(!b)return; curType=b.getAttribute("data-type");
    document.querySelectorAll("#type button").forEach(function(x){x.setAttribute("aria-pressed",String(x===b));});
    renderFields();
  });
  document.querySelectorAll(".chip").forEach(function(c){ c.addEventListener("click",function(){ c.setAttribute("aria-pressed",String(c.getAttribute("aria-pressed")!=="true")); }); });

  function buildCondition(){
    var sym=(document.getElementById("f-sym")||{}).value;
    var op=(document.getElementById("f-op")||{}).value;
    var val=(document.getElementById("f-val")||{}).value;
    if(curType==="price") return (sym||"?").toUpperCase()+" · "+op+" "+val;
    if(curType==="signal") return (sym||"Any")+" · "+op;
    if(op.indexOf("threshold")>=0){ op=op.replace("threshold", op.indexOf("drawdown")>=0 ? (val+"%") : ("$"+val)); }
    return op.charAt(0).toUpperCase()+op.slice(1);
  }

  function renderAlerts(){
    document.getElementById("alist").innerHTML=alerts.map(function(a,i){
      return '<div class="arow" data-i="'+i+'">'+
        '<div class="tbadge '+a.type+'">'+ICON[a.type]+'</div>'+
        '<div class="acond"><div class="c">'+a.cond+'</div>'+
          '<div class="m"><span class="type">'+TYPE_LABEL[a.type]+'</span> · '+a.meta+'</div></div>'+
        '<span class="status '+a.status+'">'+a.status.toUpperCase()+'</span>'+
        '<button class="iconbtn" data-act="toggle" title="Arm / pause">'+
          (a.status==="paused"
            ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 5v14l11-7z"/></svg>'
            : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 4h4v16H6zM14 4h4v16h-4z"/></svg>')+'</button>'+
        '<button class="iconbtn" data-act="del" title="Delete"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14"/></svg></button>'+
      '</div>';
    }).join("");
    var armed=alerts.filter(function(a){return a.status==="armed";}).length;
    var trig=alerts.filter(function(a){return a.status==="triggered";}).length;
    document.getElementById("active-sub").textContent="— "+armed+" armed · "+trig+" triggered";
    document.getElementById("count").textContent=alerts.length+" alerts";
  }
  function renderFeed(){
    document.getElementById("feed").innerHTML=feed.map(function(f){
      return '<div class="fitem"><span class="fdot '+f.type+'"></span><div class="fbody"><div class="ft">'+f.t+'</div><div class="fm">'+f.m+'</div></div></div>';
    }).join("");
  }

  document.getElementById("alist").addEventListener("click",function(e){
    var btn=e.target.closest("[data-act]"); if(!btn)return;
    var i=+btn.closest(".arow").getAttribute("data-i");
    if(btn.getAttribute("data-act")==="del"){ alerts.splice(i,1); }
    else { alerts[i].status = alerts[i].status==="paused" ? "armed" : "paused"; }
    renderAlerts();
  });

  var toast=document.getElementById("toast");
  document.getElementById("create").addEventListener("click",function(){
    var cond=buildCondition();
    var meta = curType==="signal" ? "from the decision engine" : curType==="risk" ? "risk-gate monitor" : "price cross";
    alerts.unshift({type:curType, cond:cond, meta:meta, status:"armed"});
    renderAlerts();
    document.getElementById("toast-txt").textContent="Alert created — "+cond;
    toast.classList.add("show"); setTimeout(function(){toast.classList.remove("show");},2400);
  });

  renderFields(); renderAlerts(); renderFeed();
})();
</script>
</body>
</html>
