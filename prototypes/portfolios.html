<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>TradeOS — Portfolios (prototype)</title>
<style>
  :root {
    --page:#0B0E13; --panel:#0F141C; --card:#141A24; --card-2:#18202c;
    --line:#1B2330; --line-2:#232D3C;
    --text:#E8ECF4; --text-2:#93A0B4; --text-3:#5A6478;
    --accent:#6E56F7; --accent-2:#8B78FF; --cyan:#22D3EE;
    --up:#2EBD85; --down:#F6465D; --caution:#F5B23B;
    --up-bg:rgba(46,189,133,.12); --down-bg:rgba(246,70,93,.12);
    --mono: ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,monospace;
    --sans: system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--page); color:var(--text); font:13px/1.45 var(--sans); -webkit-font-smoothing:antialiased; }
  .mono{font-family:var(--mono);} .tnum{font-variant-numeric:tabular-nums;}
  button,input,select{font-family:inherit;}
  .app { max-width:1180px; margin:0 auto; padding:0 20px 48px; }

  .top { display:flex; align-items:center; gap:14px; padding:16px 0; border-bottom:1px solid var(--line); }
  .brand { display:flex; align-items:center; gap:9px; font-weight:650; }
  .brand .dot { width:11px; height:11px; border-radius:3px; background:linear-gradient(135deg,var(--accent),var(--accent-2)); }
  .brand span { color:var(--text-3); font-weight:600; }
  .tool { padding-left:14px; border-left:1px solid var(--line); }
  .tool h1 { font-size:15px; margin:0; font-weight:640; }
  .tool p { margin:1px 0 0; font-size:11.5px; color:var(--text-3); }
  .spacer{flex:1;}
  .acctsel { font-family:var(--mono); font-size:12px; color:var(--text-2); background:var(--card); border:1px solid var(--line); border-radius:8px; padding:8px 12px; }

  .tiles { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin:18px 0; }
  .tile { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:14px 16px; }
  .tile .k { font-size:11px; color:var(--text-3); }
  .tile .v { font-family:var(--mono); font-variant-numeric:tabular-nums; font-size:23px; font-weight:600; letter-spacing:-.5px; margin-top:6px; }
  .tile .s { font-family:var(--mono); font-size:11px; color:var(--text-3); margin-top:3px; }
  .tile .v.up{color:var(--up);} .tile .v.down{color:var(--down);} .tile .v.acc{color:var(--accent-2);}
  .meter { height:5px; border-radius:3px; background:var(--card-2); margin-top:9px; overflow:hidden; }
  .meter i { display:block; height:100%; border-radius:3px; background:linear-gradient(90deg,var(--accent),var(--accent-2)); }
  .meter i.warn { background:linear-gradient(90deg,var(--caution),#e8912b); }

  .panel { background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:16px; margin-bottom:16px; }
  .panel-h { display:flex; align-items:baseline; gap:12px; margin-bottom:12px; }
  .panel-h h2 { font-size:13px; margin:0; font-weight:620; }
  .panel-h .sub { font-size:11.5px; color:var(--text-3); font-family:var(--mono); }

  /* allocation bar */
  .alloc { display:flex; height:36px; border-radius:9px; overflow:hidden; gap:2px; background:var(--page); }
  .alloc .seg { position:relative; cursor:default; transition:filter .12s; }
  .alloc .seg:hover { filter:brightness(1.18); }
  .alloc .seg small { position:absolute; inset:0; display:grid; place-items:center; font-size:10px; font-family:var(--mono); color:#0a0e14; font-weight:700; }
  .legend { display:flex; flex-wrap:wrap; gap:14px; margin-top:12px; }
  .legend span { display:inline-flex; align-items:center; gap:7px; font-size:12px; color:var(--text-2); font-family:var(--mono); }
  .legend i { width:10px; height:10px; border-radius:3px; }

  /* holdings table */
  .tablewrap { overflow:auto; }
  table { width:100%; border-collapse:collapse; font-size:12.5px; min-width:900px; }
  thead th { position:sticky; top:0; background:var(--panel); color:var(--text-3); font-weight:500; font-size:11px; text-align:right; padding:10px 12px; border-bottom:1px solid var(--line); white-space:nowrap; cursor:pointer; user-select:none; }
  thead th:first-child, tbody td:first-child { text-align:left; }
  thead th:hover { color:var(--text); } thead th .ar{color:var(--accent-2);font-size:9px;}
  td { padding:11px 12px; border-bottom:1px solid var(--line); font-family:var(--mono); text-align:right; white-space:nowrap; }
  tbody tr:last-child td { border-bottom:0; }
  tbody tr:hover td { background:var(--card); }
  .sym { font-family:var(--sans); font-weight:640; display:flex; align-items:center; gap:9px; }
  .swatch { width:9px; height:9px; border-radius:3px; flex-shrink:0; }
  .sym small { display:block; color:var(--text-3); font-weight:400; font-size:10.5px; font-family:var(--sans); }
  td.up{color:var(--up);} td.down{color:var(--down);}
  .rcell { color:var(--caution); }
  .stopdist { color:var(--text-2); }
  .gatecol { box-shadow:inset 1px 0 0 var(--line-2); }
  tfoot td { padding:11px 12px; font-family:var(--mono); text-align:right; border-top:1px solid var(--line-2); color:var(--text-2); }
  tfoot td:first-child { text-align:left; color:var(--text-3); }

  @media (max-width:820px){ .tiles{grid-template-columns:repeat(2,1fr);} }
</style>
</head>
<body>
<div class="app">
  <header class="top">
    <div class="brand"><span class="dot"></span>Trade<span>OS</span></div>
    <div class="tool"><h1>Portfolios</h1><p>Holdings · allocation · open risk</p></div>
    <div class="spacer"></div>
    <select class="acctsel"><option>Alpaca · Paper</option><option>All accounts</option></select>
  </header>

  <section class="tiles" id="tiles"></section>

  <section class="panel">
    <div class="panel-h"><h2>Allocation</h2><span class="sub" id="alloc-sub"></span></div>
    <div class="alloc" id="alloc"></div>
    <div class="legend" id="legend"></div>
  </section>

  <section class="panel">
    <div class="panel-h"><h2>Holdings</h2><span class="sub" id="hold-sub"></span></div>
    <div class="tablewrap">
      <table>
        <thead><tr id="head"></tr></thead>
        <tbody id="rows"></tbody>
        <tfoot id="foot"></tfoot>
      </table>
    </div>
  </section>
</div>

<script>
(function(){
  "use strict";
  var USD=new Intl.NumberFormat("en-US",{style:"currency",currency:"USD"});
  var USD0=new Intl.NumberFormat("en-US",{style:"currency",currency:"USD",maximumFractionDigits:0});
  var RISK_UNIT=1000, MAX_R=10.0;
  var HUES=["#6E56F7","#22D3EE","#A78BFA","#60A5FA","#38BDF8","#818CF8","#C084FC"];

  // positions: sym,name,sector,qty,avg,last,stop
  var pos=[
    ["JPM","JP Morgan","Financials",180,238.10,246.82,231.50],
    ["NVDA","Nvidia","Semis",95,172.40,168.05,165.90],
    ["AAPL","Apple","Tech",70,442.10,456.93,428.80],
    ["MSFT","Microsoft","Tech",42,498.30,512.40,486.10],
    ["XOM","Exxon Mobil","Energy",210,109.80,114.25,107.60],
    ["UNH","UnitedHealth","Health",30,505.60,498.20,479.90],
    ["CAT","Caterpillar","Industrials",48,362.10,377.55,351.20]
  ].map(function(p,i){
    var qty=p[3],avg=p[4],last=p[5],stop=p[6];
    var mkt=qty*last, cost=qty*avg, upl=mkt-cost;
    var rps=Math.max(0.01,last-stop), risk=qty*rps;
    return {i:i,sym:p[0],name:p[1],sector:p[2],qty:qty,avg:avg,last:last,stop:stop,
      mkt:mkt,cost:cost,upl:upl,uplPct:upl/cost*100,rps:rps,risk:risk,R:risk/RISK_UNIT,
      day:(Math.sin(i*17.3+1.2)*1.8), stopDist:(last-stop)/last*100, hue:HUES[i%HUES.length]};
  });
  var CASH=18240.55;
  var invested=pos.reduce(function(s,p){return s+p.mkt;},0);
  var total=invested+CASH;
  pos.forEach(function(p){ p.weight=p.mkt/total*100; });
  var totUPL=pos.reduce(function(s,p){return s+p.upl;},0);
  var totRisk=pos.reduce(function(s,p){return s+p.risk;},0);
  var totR=totRisk/RISK_UNIT;
  var dayPL=pos.reduce(function(s,p){return s+p.mkt*(p.day/100);},0);

  // tiles
  function tiles(){
    var up=totUPL>=0, dUp=dayPL>=0;
    var rPct=Math.min(100,totR/MAX_R*100);
    document.getElementById("tiles").innerHTML=
      tile("Total value",USD.format(total),"", pos.length+" positions · "+USD0.format(CASH)+" cash")+
      tile("Today's P/L",(dUp?"+":"−")+USD.format(Math.abs(dayPL)),dUp?"up":"down",(dUp?"+":"−")+Math.abs(dayPL/total*100).toFixed(2)+"%")+
      tile("Unrealized P/L",(up?"+":"−")+USD.format(Math.abs(totUPL)),up?"up":"down",(up?"+":"−")+(totUPL/pos.reduce(function(s,p){return s+p.cost;},0)*100).toFixed(2)+"% on cost")+
      '<div class="tile"><div class="k">Open risk</div><div class="v acc">'+totR.toFixed(2)+'R</div>'+
        '<div class="meter"><i class="'+(rPct>80?"warn":"")+'" style="width:'+rPct+'%"></i></div>'+
        '<div class="s">'+USD0.format(totRisk)+' at stake · '+MAX_R.toFixed(1)+'R cap</div></div>';
  }
  function tile(k,v,cls,s){ return '<div class="tile"><div class="k">'+k+'</div><div class="v '+cls+'">'+v+'</div><div class="s">'+s+'</div></div>'; }

  // allocation
  function alloc(){
    var segs=pos.slice().sort(function(a,b){return b.weight-a.weight;});
    var html=segs.map(function(p){
      return '<div class="seg" style="flex:'+p.weight+';background:'+p.hue+'" title="'+p.sym+' '+p.weight.toFixed(1)+'%">'+(p.weight>7?'<small>'+p.sym+'</small>':'')+'</div>';
    }).join("");
    var cashW=CASH/total*100;
    html+='<div class="seg" style="flex:'+cashW+';background:#3A4459" title="Cash '+cashW.toFixed(1)+'%">'+(cashW>7?'<small style="color:#93A0B4">CASH</small>':'')+'</div>';
    document.getElementById("alloc").innerHTML=html;
    document.getElementById("legend").innerHTML=segs.map(function(p){
      return '<span><i style="background:'+p.hue+'"></i>'+p.sym+' '+p.weight.toFixed(1)+'%</span>';
    }).join("")+'<span><i style="background:#3A4459"></i>Cash '+cashW.toFixed(1)+'%</span>';
    document.getElementById("alloc-sub").textContent=USD0.format(invested)+" invested · "+USD0.format(CASH)+" cash";
  }

  // holdings table
  var cols=[
    {k:"sym",t:"Symbol",n:false},
    {k:"qty",t:"Qty",n:true,f:function(p){return p.qty;}},
    {k:"avg",t:"Avg",n:true,f:function(p){return p.avg.toFixed(2);}},
    {k:"last",t:"Last",n:true,f:function(p){return p.last.toFixed(2);}},
    {k:"day",t:"Day",n:true,cls:function(p){return p.day>=0?"up":"down";},f:function(p){return (p.day>=0?"▲":"▼")+" "+Math.abs(p.day).toFixed(2)+"%";}},
    {k:"mkt",t:"Mkt value",n:true,f:function(p){return USD0.format(p.mkt);}},
    {k:"weight",t:"Weight",n:true,f:function(p){return p.weight.toFixed(1)+"%";}},
    {k:"upl",t:"Unreal. P/L",n:true,cls:function(p){return p.upl>=0?"up":"down";},f:function(p){return (p.upl>=0?"+":"−")+USD0.format(Math.abs(p.upl))+"  ("+(p.upl>=0?"+":"−")+Math.abs(p.uplPct).toFixed(1)+"%)";}},
    {k:"stop",t:"Stop",n:true,gate:true,f:function(p){return p.stop.toFixed(2);}},
    {k:"stopDist",t:"→ Stop",n:true,gate:true,cls:function(){return "stopdist";},f:function(p){return "−"+p.stopDist.toFixed(1)+"%";}},
    {k:"R",t:"Open risk",n:true,gate:true,cls:function(){return "rcell";},f:function(p){return p.R.toFixed(2)+"R";}}
  ];
  var sort={k:"weight",dir:-1};
  document.getElementById("head").innerHTML=cols.map(function(c){return '<th class="'+(c.n?"num":"")+(c.gate?" gatecol":"")+'" data-k="'+c.k+'">'+c.t+' <span class="ar" data-ar="'+c.k+'"></span></th>';}).join("");

  function rows(){
    var list=pos.slice().sort(function(a,b){var av=a[sort.k],bv=b[sort.k]; if(typeof av==="string")return sort.dir*av.localeCompare(bv); return sort.dir*(av-bv);});
    document.getElementById("rows").innerHTML=list.map(function(p){
      return "<tr>"+cols.map(function(c){
        if(c.k==="sym") return '<td><span class="sym"><span class="swatch" style="background:'+p.hue+'"></span>'+p.sym+'<small>'+p.name+' · '+p.sector+'</small></span></td>';
        return '<td class="'+((c.n?"num ":"")+(c.gate?"gatecol ":"")+(c.cls?c.cls(p):"")).trim()+'">'+c.f(p)+'</td>';
      }).join("")+"</tr>";
    }).join("");
    cols.forEach(function(c){document.querySelector('[data-ar="'+c.k+'"]').textContent=sort.k===c.k?(sort.dir<0?"▼":"▲"):"";});
    document.getElementById("foot").innerHTML="<tr><td>Total · "+pos.length+" positions</td>"+
      "<td colspan=4></td><td>"+USD0.format(invested)+"</td><td>"+(invested/total*100).toFixed(1)+"%</td>"+
      "<td class=\""+(totUPL>=0?"up":"down")+"\">"+(totUPL>=0?"+":"−")+USD0.format(Math.abs(totUPL))+"</td>"+
      "<td class=gatecol></td><td class=gatecol></td><td class=\"gatecol rcell\">"+totR.toFixed(2)+"R</td></tr>";
    document.getElementById("hold-sub").textContent=totR.toFixed(2)+"R total open risk of "+MAX_R.toFixed(1)+"R cap";
  }
  document.getElementById("head").addEventListener("click",function(e){var th=e.target.closest("th");if(!th)return;var k=th.getAttribute("data-k");if(sort.k===k)sort.dir*=-1;else{sort.k=k;sort.dir=(k==="sym")?1:-1;}rows();});

  tiles(); alloc(); rows();
})();
</script>
</body>
</html>
